services:
  nexus-bot:
    build: .
    container_name: nexus-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    mem_limit: 900m
    memswap_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
